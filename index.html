<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Isogon</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Zen+Dots&family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=Montserrat:wght@400;600;700&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0d1b2e;--gold:#c9a84c;--g50:#f7f8fa;--g100:#eef0f3;--g200:#dde1e7;--g400:#9aa3b0;--g600:#5a6470;--g800:#2d3748;--ok:#2f9e5e;--err:#d94040}
body{font-family:'DM Sans',sans-serif;background:var(--g50);min-height:100vh;color:var(--g800)}
/* Zen Dots for all card text */
.c-name,.c-title,.c-tag,.c-co,.c-line,.c-foot,.c-av,
.mv-name,.mv-title,.mv-tag,.mv-ct,.mv-foot,
.dl-btn,.scan-tip{font-family:'Zen Dots',cursive!important}
#app{min-height:100vh}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;transition:all .18s;text-decoration:none;white-space:nowrap}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:#162438}
.btn-ghost{background:transparent;border:1px solid var(--g200);color:var(--g600)}.btn-ghost:hover{background:var(--g100)}
.btn-danger{background:transparent;border:1px solid #f5c6c6;color:var(--err)}.btn-danger:hover{background:#fff5f5}
.btn:disabled{opacity:.5;cursor:not-allowed}
.spin{width:28px;height:28px;border:2px solid var(--g200);border-top-color:var(--navy);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lscr{min-height:100vh;display:flex;align-items:center;justify-content:center}
.fg{margin-bottom:12px}.fl{display:block;font-size:12px;font-weight:500;color:var(--g600);margin-bottom:5px}
.fi{width:100%;padding:9px 12px;border:1px solid var(--g200);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--g800);background:#fff;outline:none;transition:border-color .18s}
.fi:focus{border-color:var(--navy)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:520px){.fr{grid-template-columns:1fr}}
.tgl{position:relative;width:38px;height:21px;display:inline-block;flex-shrink:0}
.tgl input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:var(--g200);border-radius:21px;cursor:pointer;transition:background .2s}
.tsl::before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s}
.tgl input:checked+.tsl{background:var(--ok)}
.tgl input:checked+.tsl::before{transform:translateX(17px)}
.bdg{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.bdg-on{background:#d4f5e2;color:#1a6640}.bdg-off{background:#fde8e8;color:#b03030}
input[type=range]{width:100%;accent-color:var(--navy);height:4px;cursor:pointer}
input[type=color]{width:38px;height:32px;border:1px solid var(--g200);border-radius:6px;padding:2px;cursor:pointer;background:#fff}

/* ══ ISOGON ANIMATED BG ══ */
.iso-bg-wrap{position:absolute;inset:0;overflow:hidden;border-radius:inherit;z-index:0;pointer-events:none}
.iso-bg-wrap svg{width:100%;height:100%;display:block}
@keyframes isoSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes isoSpinR{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes isoPulse{0%,100%{opacity:.18}50%{opacity:.38}}
@keyframes isoGlow{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes isoFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-5px)}}
.iso-ring1{animation:isoSpin 22s linear infinite;transform-box:fill-box;transform-origin:center}
.iso-ring2{animation:isoSpinR 14s linear infinite;transform-box:fill-box;transform-origin:center}
.iso-ring3{animation:isoSpin 35s linear infinite;transform-box:fill-box;transform-origin:center}
.iso-glow1{animation:isoGlow 4s ease-in-out infinite}
.iso-glow2{animation:isoGlow 5s ease-in-out infinite 1.5s}
.iso-logo{/* static logo */}
.iso-nodes{animation:isoPulse 3s ease-in-out infinite}

/* ══ CARD PAGE ══ */
#card-page{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 28px;position:relative;overflow:hidden;background:#080c18}
#card-page.bg-glass{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 35%,#0f3460 65%,#533483 100%)!important}
.biz-card{width:min(340px,90vw);height:min(420px,58vh);border-radius:20px;padding:20px 22px 18px;position:relative;overflow:hidden;z-index:2;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.06);flex-shrink:0}
.biz-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,transparent,var(--ac,#c9a84c) 38%,var(--ac2,#e8c97a) 62%,transparent);z-index:10}
/* Glass theme special styles */
.biz-card.theme-glass{
  background:rgba(255,255,255,0.10)!important;
  backdrop-filter:blur(18px) saturate(180%);
  -webkit-backdrop-filter:blur(18px) saturate(180%);
  border:1px solid rgba(255,255,255,0.25)!important;
  box-shadow:0 8px 32px rgba(0,0,0,0.28),inset 0 1px 0 rgba(255,255,255,0.35),inset 0 -1px 0 rgba(255,255,255,0.08)!important;
}
.biz-card.theme-glass::before{
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.7) 38%,rgba(255,255,255,0.95) 62%,transparent)!important;
}
/* Glass page background - colorful blur blobs */
#card-page.bg-glass{
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 35%,#0f3460 65%,#533483 100%)!important;
}
.card-bg-layer{position:absolute;inset:0;background-size:cover;background-position:center;border-radius:20px;z-index:0}
.card-bg-ov{position:absolute;inset:0;border-radius:20px;z-index:1}
.biz-card>*:not(.iso-bg-wrap):not(.card-bg-layer):not(.card-bg-ov){position:relative;z-index:5}
.c-top{display:flex;align-items:center;gap:11px}
.c-av{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.c-ph{width:38px;height:38px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(255,255,255,.22);flex-shrink:0}
.c-tagw{display:flex;flex-direction:column}
.c-tag{font-size:7.5px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.c-co{font-size:9.5px;opacity:.4;margin-top:1px}
.c-mid{flex:1;display:flex;flex-direction:column;justify-content:center;padding:12px 0 8px}
.c-name{font-family:'Zen Dots',cursive;font-weight:600;line-height:1.2;margin-bottom:3px}
.c-title{font-weight:300;letter-spacing:.4px;margin-bottom:12px;opacity:.55}
.c-rule{width:26px;height:1px;opacity:.7;margin-bottom:10px;border-radius:1px}
.c-contacts{display:flex;flex-direction:column}
.c-line{display:flex;align-items:center;gap:7px}
.c-line svg{flex-shrink:0;opacity:.8}
.c-line a{color:inherit;text-decoration:none}
.c-bot{display:flex;align-items:center;justify-content:space-between}
.c-qr-box{background:#fff;border-radius:7px;padding:5px;flex-shrink:0}
.c-foot{font-size:7.5px;letter-spacing:2px;text-transform:uppercase;opacity:.25}
.card-actions{display:flex;flex-direction:column;align-items:center;gap:11px;margin-top:18px;z-index:2;position:relative}
.dl-btn{display:flex;align-items:center;gap:8px;border:none;border-radius:10px;padding:11px 30px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s}
.dl-btn:hover{opacity:.88}.dl-btn:disabled{opacity:.5;cursor:not-allowed}
.scan-tip{font-size:9.5px;color:rgba(255,255,255,.32);letter-spacing:1px;text-transform:uppercase}
@keyframes gBlob1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,20px) scale(1.15)}}
.glass-blobs{position:absolute;inset:0;z-index:0;overflow:hidden;border-radius:inherit}
.gb{position:absolute;border-radius:50%;filter:blur(55px)}
.gb1{width:220px;height:220px;background:rgba(124,58,237,0.5);top:-50px;left:-50px;animation:gBlob1 8s ease-in-out infinite}
.gb2{width:180px;height:180px;background:rgba(56,189,248,0.4);bottom:-40px;right:-40px;animation:gBlob2 10s ease-in-out infinite}
.gb3{width:150px;height:150px;background:rgba(201,168,76,0.3);top:40%;left:30%;animation:gBlob3 7s ease-in-out infinite}
@keyframes gBlob2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-25px,-20px) scale(1.1)}}
@keyframes gBlob3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.2)}}

/* ══ ADMIN SHELL ══ */
.admin-wrap{min-height:100vh;background:var(--g50)}
.top-bar{background:#fff;border-bottom:1px solid var(--g200);padding:0 26px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10}
.top-logo{font-family:'Zen Dots',cursive;font-size:17px;color:var(--navy)}
.top-r{display:flex;align-items:center;gap:12px}
.top-em{font-size:12px;color:var(--g400)}
.mc{padding:28px 26px;max-width:1200px;margin:0 auto}
.pt{font-size:20px;font-weight:600;color:var(--navy);margin-bottom:22px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:24px}
.sb{background:#fff;border-radius:12px;border:1px solid var(--g200);padding:16px}
.sl{font-size:11px;color:var(--g400);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.sn{font-size:24px;font-weight:600;color:var(--navy)}
.tc{background:#fff;border-radius:12px;border:1px solid var(--g200);overflow:hidden}
.th{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--g200)}
.tt{font-size:14px;font-weight:500;color:var(--navy)}
.cu{list-style:none}
.cr{border-bottom:1px solid var(--g100)}
.cr:last-child{border-bottom:none}
.cr-main{display:flex;align-items:center;padding:11px 20px;gap:11px;flex-wrap:wrap}
.cr-main:hover{background:var(--g50)}
.ra{width:34px;height:34px;border-radius:50%;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.ri{flex:1;min-width:0}
.rn{font-size:13px;font-weight:500;color:var(--g800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rs{font-size:11px;color:var(--g400);margin-top:1px}
.rdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(0,0,0,.08)}
.ract{display:flex;gap:5px;flex-shrink:0}
.ib{width:30px;height:30px;border-radius:7px;border:1px solid var(--g200);background:transparent;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;color:var(--g600);transition:all .15s}
.ib svg{width:13px;height:13px}
.ib:hover{background:var(--g100);color:var(--g800)}
.ib.dl:hover{background:#e8f5ee;border-color:#b2dfc5;color:var(--ok)}
.ib.del:hover{background:#fff5f5;border-color:#f5c6c6;color:var(--err)}
.prev-toggle{font-size:11px;color:var(--g400);padding:0 4px;display:flex;align-items:center;gap:3px;cursor:pointer;user-select:none}
.prev-toggle svg{width:12px;height:12px;transition:transform .2s}
.prev-toggle.open svg{transform:rotate(180deg)}
.cr-preview{display:none;padding:16px 20px 20px;background:var(--g50);border-top:1px solid var(--g100)}
.cr-preview.open{display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.prev-card-shell{width:170px;height:210px;border-radius:12px;overflow:hidden;position:relative;box-shadow:0 8px 28px rgba(0,0,0,.22);flex-shrink:0}
.prev-info{flex:1;min-width:160px}
.prev-url{font-size:11px;color:var(--g600);word-break:break-all;margin-bottom:10px;line-height:1.5}
.prev-qr{display:inline-block;background:#fff;border-radius:8px;padding:5px}
.empty{padding:44px;text-align:center;color:var(--g400);font-size:13px}

/* LOGIN */
#login-page{min-height:100vh;display:flex;align-items:center;justify-content:center}
.lcard{background:#fff;border-radius:18px;border:1px solid var(--g200);padding:38px;width:100%;max-width:360px;box-shadow:0 4px 28px rgba(0,0,0,.07)}
.lmark{font-family:'Zen Dots',cursive;font-size:20px;color:var(--navy);margin-bottom:5px}
.lsub{font-size:12px;color:var(--g400);margin-bottom:26px}
.lerr{font-size:12px;color:var(--err);margin-top:9px;display:none}

/* EDITOR */
.egrid{display:grid;grid-template-columns:1fr 300px;gap:24px;align-items:start}
@media(max-width:820px){.egrid{grid-template-columns:1fr}}
.eform{background:#fff;border-radius:12px;border:1px solid var(--g200);padding:24px}
.eprev{position:sticky;top:70px}
.pvlbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--g400);margin-bottom:9px;font-weight:500}
.sok{font-size:12px;color:var(--ok);margin-top:9px;display:none}
.serr{font-size:12px;color:var(--err);margin-top:9px;display:none}
.sec-hd{font-size:12px;font-weight:600;color:var(--navy);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 12px;padding-top:16px;border-top:1px solid var(--g100)}
/* Theme swatches */
.tpick{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:6px}
.tsw{border-radius:8px;height:40px;cursor:pointer;border:2.5px solid transparent;position:relative;overflow:hidden;transition:all .18s}
.tsw:hover{transform:scale(1.07)}
.tsw.active{border-color:#fff;box-shadow:0 0 0 2.5px var(--navy),0 4px 12px rgba(0,0,0,.2)}
.tsw span{position:absolute;bottom:3px;left:0;right:0;text-align:center;font-size:7px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:rgba(255,255,255,.9);text-shadow:0 1px 3px rgba(0,0,0,.6)}
.sw-midnight{background:linear-gradient(135deg,#0d1b2e 30%,#c9a84c)}
.sw-obsidian{background:linear-gradient(135deg,#111 30%,#e0c97a)}
.sw-forest{background:linear-gradient(135deg,#0d2318 30%,#5fcf80)}
.sw-crimson{background:linear-gradient(135deg,#1a0a0a 30%,#e05555)}
.sw-violet{background:linear-gradient(135deg,#130d2e 30%,#a78bfa)}
.sw-ocean{background:linear-gradient(135deg,#062030 30%,#38bdf8)}
.sw-ivory{background:linear-gradient(135deg,#faf8f3 30%,#8b6914)}
.sw-slate{background:linear-gradient(135deg,#1e2530 30%,#64d2c8)}
.sw-isogon{background:linear-gradient(135deg,#080c18 30%,#7c3aed 65%,#c9a84c)}
.sw-glass{background:linear-gradient(135deg,rgba(120,180,255,0.35),rgba(255,255,255,0.55));backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.4);box-shadow:inset 0 1px 0 rgba(255,255,255,0.5)}
/* BG tabs */
.bg-tabs{display:flex;border-bottom:1px solid var(--g200);margin-bottom:12px;overflow-x:auto}
.bg-tab{padding:7px 12px;font-size:11.5px;font-weight:500;color:var(--g400);cursor:pointer;border:none;background:transparent;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-family:'DM Sans',sans-serif}
.bg-tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.bg-preview-box{width:100%;height:54px;border-radius:8px;border:1px solid var(--g200);margin-bottom:8px;background-size:cover;background-position:center;position:relative;overflow:hidden}
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.color-swatch{width:28px;height:28px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s;flex-shrink:0}
.color-swatch.active{border-color:var(--navy);box-shadow:0 0 0 1.5px var(--g400)}
.color-swatch:hover{transform:scale(1.12)}
/* Tint swatches */
.tint-sw{width:36px;height:36px;border-radius:8px;cursor:pointer;position:relative;overflow:hidden;border:2.5px solid var(--g200);transition:all .15s;flex-shrink:0}
.tint-sw:hover{transform:scale(1.08)}
.tint-sw.active{border-color:var(--navy);box-shadow:0 0 0 2px var(--g400)}
.tint-sw-lbl{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-size:6.5px;color:#fff;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.9);line-height:1}
/* Size controls */
.size-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.size-lbl{font-size:12px;color:var(--g600);width:90px;flex-shrink:0}
.size-val{font-size:11px;color:var(--g400);width:32px;text-align:right;flex-shrink:0}
/* Mini preview */
.mnwrap{border-radius:14px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.2);width:100%;aspect-ratio:340/420;display:flex;flex-direction:column;justify-content:space-between;padding:13px 15px 11px;position:relative;transition:background .3s}
.mnwrap::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--ac,#c9a84c) 40%,var(--ac2,#e8c97a) 60%,transparent);z-index:10}
.mnwrap.theme-glass{overflow:hidden}
.mnwrap.theme-glass::before{background:linear-gradient(90deg,transparent,rgba(255,255,255,0.8) 40%,rgba(255,255,255,1) 60%,transparent)!important}
.mnwrap>*{position:relative;z-index:5}
.mv-ini{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin-bottom:6px}
.mv-tag{font-size:5.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px}
.mv-name{font-family:'Zen Dots',cursive;font-weight:600;margin-bottom:2px}
.mv-title{opacity:.5;margin-bottom:8px}
.mv-rule{width:16px;height:1px;opacity:.7;margin-bottom:7px;border-radius:1px}
.mv-ct{margin-bottom:3px}
.mv-foot{font-size:5.5px;letter-spacing:1.5px;text-transform:uppercase;opacity:.25}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:18px;padding:26px;width:280px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-name{font-size:15px;font-weight:500;color:var(--navy);margin-bottom:14px}
.modal-qr-el{display:flex;justify-content:center;margin:12px 0}
.modal-url{font-size:10px;color:var(--g400);word-break:break-all;margin-bottom:14px;line-height:1.5}
.modal-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.nf{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--g400)}
@media(max-width:480px){.mc{padding:18px 12px}.top-bar{padding:0 14px}.top-em{display:none}}
</style>
</head>
<body>
<div id="app"><div class="lscr"><div class="spin"></div></div></div>

/* ── ISOGON ANIMATED SVG ── */
function isoSVG(w,h,tintIdx,brightness){
  const cx=w/2,cy=h/2,sc=Math.min(w,h)/340;
  const tint=ISO_TINTS[tintIdx]||ISO_TINTS[0];
  const tintColor=tint.color;
  const isLight=(brightness||0)>45||(tintIdx||0)>=7;
  const brightAlpha=brightness>0?(brightness/100).toFixed(2):'0';
  /* hex ring helper */
  function hx(r,off=0){return Array.from({length:6},(_,i)=>{const a=(i*60+off)*Math.PI/180;return`${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;}).join(' ');}
  function hxArr(r,off=0){return Array.from({length:6},(_,i)=>{const a=(i*60+off)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];});}
  const r1=90*sc,r2=140*sc,r3=55*sc;
  const p1=hxArr(r1,0),p2=hxArr(r2,15);
  const tintRect=tintColor?`<rect width="${w}" height="${h}" fill="${tintColor}"/>`:'';
  const brightRect=+brightAlpha>0?`<rect width="${w}" height="${h}" fill="rgba(255,255,255,${brightAlpha})"/>`:'';

  /* ── Real Isogon logo ──
     Original viewBox: 40 18 87 98  (width=87, height=98)
     We place it bottom-right at 15% card width, with glow + slow rotation
     Logo color: contrasts with background */
  const logoSize=Math.round(w*0.22);
  const logoX=w-logoSize-Math.round(w*0.04);
  const logoY=h-logoSize-Math.round(h*0.04);
  /* Logo always uses exact brand color #e8d5a3 */
  const logoStroke='#e8d5a3';
  const logoOpacity='0.88';
  const logoGlowColor='rgba(232,213,163,0.10)';

  return `<div class="iso-bg-wrap"><svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="ibg${w}x${h}" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1020"/>
      <stop offset="100%" stop-color="#080c18"/>
    </radialGradient>
    <radialGradient id="gl1${w}" cx="28%" cy="22%" r="55%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gl2${w}" cx="72%" cy="78%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lglow${w}" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="${logoGlowColor.replace('rgba','rgb').split(',').slice(0,3).join(',')+',0.15)'.replace('rgb','rgba')}" stop-opacity="1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <filter id="lgf${w}" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="${3*sc}" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep background -->
  <rect width="${w}" height="${h}" fill="url(#ibg${w}x${h})"/>
  <!-- Animated glows -->
  <rect class="iso-glow1" width="${w}" height="${h}" fill="url(#gl1${w})"/>
  <rect class="iso-glow2" width="${w}" height="${h}" fill="url(#gl2${w})"/>

  <!-- Outer hex ring - slow spin -->
  <g class="iso-ring3" style="transform-origin:${cx}px ${cy}px">
    <polygon points="${hx(r2,15)}" stroke="rgba(201,168,76,0.12)" stroke-width="${sc}" fill="none"/>
    ${p2.map(([x,y])=>`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${2*sc}" fill="#7c3aed" opacity=".38"/>`).join('')}
  </g>
  <!-- Middle hex - counter spin -->
  <g class="iso-ring2" style="transform-origin:${cx}px ${cy}px">
    <polygon points="${hx(r1,0)}" stroke="rgba(201,168,76,0.22)" stroke-width="${1.2*sc}" fill="none"/>
    ${p1.map(([x,y])=>`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${2.5*sc}" fill="#c9a84c" opacity=".42"/>`).join('')}
  </g>
  <!-- Inner tri - spin -->
  <g class="iso-ring1" style="transform-origin:${cx}px ${cy}px">
    <polygon points="${hx(r3,30)}" stroke="rgba(201,168,76,0.16)" stroke-width="${0.9*sc}" fill="none"/>
  </g>
  <!-- Spoke lines from center -->
  ${p1.map(([x,y])=>`<line x1="${cx}" y1="${cy}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="rgba(201,168,76,0.07)" stroke-width="${0.8*sc}"/>`).join('')}
  <circle cx="${cx}" cy="${cy}" r="${3*sc}" fill="#c9a84c" opacity=".28"/>

  <!-- Tint + brightness overlays -->
  ${tintRect}${brightRect}

  <!-- ── ISOGON LOGO (bottom-right, slow 3D-tilt rotation) ── -->
  <g class="iso-logo" style="transform-origin:${(logoX+logoSize/2).toFixed(1)}px ${(logoY+logoSize/2).toFixed(1)}px" filter="url(#lgf${w})" opacity="${logoOpacity}">
    <!-- Glow halo behind logo -->
    <ellipse cx="${(logoX+logoSize/2).toFixed(1)}" cy="${(logoY+logoSize/2).toFixed(1)}"
      rx="${(logoSize*0.72).toFixed(1)}" ry="${(logoSize*0.72).toFixed(1)}"
      fill="url(#lglow${w})"/>
    <!-- The actual Isogon SVG logo, scaled into position -->
    <svg x="${logoX}" y="${logoY}" width="${logoSize}" height="${logoSize}" viewBox="40 18 87 98" preserveAspectRatio="xMidYMid meet">
      <g fill="none" stroke="${logoStroke}" stroke-width="5" stroke-miterlimit="10">
        <polygon points="103.6,78.7 83.6,90.3 63.6,78.7 63.6,55.6 83.6,44.1 103.6,55.6"/>
        <polygon points="123.6,90.3 83.6,113.4 43.6,90.3 43.6,44.1 83.6,21 123.6,44.1"/>
      </g>
      <line fill="none" stroke="${logoStroke}" stroke-width="5" x1="43.6" y1="44.1" x2="123.6" y2="90.3"/>
      <line fill="none" stroke="${logoStroke}" stroke-width="5" x1="123.6" y1="44.1" x2="43.6" y2="90.3"/>
      <line fill="none" stroke="${logoStroke}" stroke-width="5" x1="83.6" y1="21" x2="83.6" y2="113.4"/>
    </svg>
  </g>

</svg></div>`;
}


/* ── CANVAS PNG for download ── */
let ISOGON_BG='';
function buildIsogonBg(tintIdx,brightness){
  const W=680,H=840,cx=W/2,cy=H/2;
  const cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H));
  bg.addColorStop(0,'#0d1020');bg.addColorStop(1,'#080c18');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  [[W*.28,H*.22,300,'rgba(124,58,237,0.14)'],[W*.72,H*.78,250,'rgba(201,168,76,0.10)']].forEach(([gx,gy,gr,col])=>{
    const g=ctx.createRadialGradient(gx,gy,0,gx,gy,gr);g.addColorStop(0,col);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  });
  function hxA(r,off=0){return Array.from({length:6},(_,i)=>{const a=(i*60+off)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];});}
  function dHex(pts,stroke,sw,alpha){ctx.beginPath();pts.forEach(([x,y],i)=>{if(i)ctx.lineTo(x,y);else ctx.moveTo(x,y);});ctx.closePath();ctx.strokeStyle=stroke;ctx.lineWidth=sw;ctx.globalAlpha=alpha;ctx.stroke();ctx.globalAlpha=1;}
  function dDot(x,y,r,fill,alpha){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=fill;ctx.globalAlpha=alpha;ctx.fill();ctx.globalAlpha=1;}
  const h6=hxA(180,0),h6o=hxA(280,15),h6i=hxA(110,30);
  dHex(h6,'#c9a84c',2.4,0.25);dHex(h6o,'#c9a84c',1.6,0.12);dHex(h6i,'#c9a84c',1.8,0.18);
  h6.forEach(([x,y])=>dDot(x,y,5,'#c9a84c',0.45));
  h6o.forEach(([x,y])=>dDot(x,y,4,'#7c3aed',0.38));
  h6.forEach(([x,y])=>{ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.strokeStyle='rgba(201,168,76,0.07)';ctx.lineWidth=1.6;ctx.stroke();});
  dDot(cx,cy,6,'#c9a84c',0.30);
  const ti=ISO_TINTS[tintIdx||0];
  if(ti&&ti.color){ctx.fillStyle=ti.color;ctx.fillRect(0,0,W,H);}
  if(brightness>0){ctx.fillStyle=`rgba(255,255,255,${(brightness/100).toFixed(2)})`;ctx.fillRect(0,0,W,H);}
  const isLight=(brightness||0)>45||(tintIdx||0)>=7;
  // Draw Isogon logo SVG at bottom-right via canvas
  const lSz=W*0.22, lX=W-lSz-W*0.04, lY=H-lSz-H*0.04;
  // viewBox: 40 18 87 98  => scale to lSz
  const vW=87,vH=98,vX=40,vY=18;
  const scX=lSz/vW,scY=lSz/vH;
  ctx.save();
  ctx.translate(lX-vX*scX,lY-vY*scY);
  ctx.scale(scX,scY);
  ctx.strokeStyle='#e8d5a3'; // fixed brand color always
  ctx.lineWidth=5*(1/scX);
  ctx.globalAlpha=isLight?0.75:0.88;
  ctx.lineCap='round';ctx.lineJoin='round';
  // Inner hexagon
  ctx.beginPath();
  [[103.6,78.7],[83.6,90.3],[63.6,78.7],[63.6,55.6],[83.6,44.1],[103.6,55.6]].forEach(([x,y],i)=>{if(i)ctx.lineTo(x,y);else ctx.moveTo(x,y);});
  ctx.closePath();ctx.stroke();
  // Outer hexagon
  ctx.beginPath();
  [[123.6,90.3],[83.6,113.4],[43.6,90.3],[43.6,44.1],[83.6,21],[123.6,44.1]].forEach(([x,y],i)=>{if(i)ctx.lineTo(x,y);else ctx.moveTo(x,y);});
  ctx.closePath();ctx.stroke();
  // Cross lines
  [[43.6,44.1,123.6,90.3],[123.6,44.1,43.6,90.3],[83.6,21,83.6,113.4]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  ctx.restore();
  ctx.globalAlpha=1;
  ISOGON_BG=cv.toDataURL('image/png');
  return ISOGON_BG;
}

async function buildDownload(c){
  const bg=getCardBg(c);const textColor=resolveTextColor(c,bg);
  const isGlassTheme=(c.theme||'midnight')==='glass';
  const accent=c.accent_color||(isGlassTheme?'rgba(255,255,255,0.9)':TH[c.theme||'midnight'].a);
  const accent2=TH[c.theme||'midnight'].a2;
  const namePx=c.size_title||20;const ctPx=c.size_contact||10;
  if(bg.type==='isogon')buildIsogonBg(c.iso_tint||0,c.iso_brightness||0);
  const tpl=document.createElement('div');
  Object.assign(tpl.style,{position:'fixed',left:'-9999px',top:'0',width:'340px',height:'420px',fontFamily:"'DM Sans',sans-serif",borderRadius:'20px',overflow:'hidden',display:'flex',flexDirection:'column',justifyContent:'space-between',boxSizing:'border-box',padding:'20px 22px 18px'});
  if(bg.type==='isogon'&&ISOGON_BG){tpl.style.backgroundImage=`url('${ISOGON_BG}')`;tpl.style.backgroundSize='cover';}
  if((c.theme||'midnight')==='glass'&&bg.type==='gradient'){
    tpl.style.background='rgba(255,255,255,0.12)';
    tpl.style.backdropFilter='blur(20px)';
    tpl.style.border='1px solid rgba(255,255,255,0.28)';
    /* wrap in colored bg */
    const glassWrap=document.createElement('div');
    Object.assign(glassWrap.style,{position:'fixed',left:'-9999px',top:'0',width:'340px',height:'420px',background:'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460,#533483)',borderRadius:'20px',overflow:'hidden'});
    document.body.appendChild(glassWrap);
    glassWrap.appendChild(tpl);
    tpl._glassWrap=glassWrap;
  }
  else if(bg.type==='img'){tpl.style.backgroundImage=`url('${bg.url}')`;tpl.style.backgroundSize='cover';tpl.style.backgroundPosition='center';}
  else if(bg.type==='color'){tpl.style.background=bg.color;}
  else{tpl.style.background=bg.grad;}
  const ovAlpha=((c.bg_overlay_opacity??50)/100).toFixed(2);
  const qid='dlqr'+Date.now();
  tpl.innerHTML=`
    ${bg.type==='img'?`<div style="position:absolute;inset:0;background:rgba(0,0,0,${ovAlpha})"></div>`:''}
    <div style="position:absolute;top:0;left:0;right:0;height:2.5px;background:linear-gradient(90deg,transparent,${accent} 38%,${accent2} 62%,transparent)"></div>
    <div style="position:relative;display:flex;align-items:center;gap:11px">
      <div style="width:38px;height:38px;border-radius:50%;background:${accent}20;border:1.5px solid ${accent}55;display:flex;align-items:center;justify-content:center;color:${accent};font-size:13px;font-weight:700">${ini(c.name)}</div>
      <div>
        <div style="font-size:7.5px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:${accent}">${c.company||'Isogon'}</div>
        <div style="font-size:9.5px;color:${textColor};opacity:.4">isogon.in</div>
      </div>
    </div>
    <div style="position:relative;flex:1;display:flex;flex-direction:column;justify-content:center;padding:12px 0 8px">
      <div style="font-family:'Zen Dots',cursive;font-size:${namePx}px;font-weight:600;color:${textColor};line-height:1.2;margin-bottom:3px">${c.name}</div>
      <div style="font-size:${Math.round(namePx*.52)}px;color:${textColor};opacity:.55;font-weight:300;margin-bottom:12px">${c.title||''}</div>
      <div style="width:26px;height:1px;background:${accent};opacity:.7;margin-bottom:10px;border-radius:1px"></div>
      <div style="display:flex;flex-direction:column;gap:${Math.round(ctPx*.6)}px">
        ${c.phone?`<div style="font-size:${ctPx}px;color:${textColor}">📞  ${c.phone}</div>`:''}
        ${c.email?`<div style="font-size:${ctPx}px;color:${textColor}">✉  ${c.email}</div>`:''}
        ${c.website?`<div style="font-size:${ctPx}px;color:${textColor}">🌐  ${c.website}</div>`:''}
      </div>
    </div>
    <div style="position:relative;display:flex;align-items:center;justify-content:space-between">
      <div style="background:#fff;border-radius:7px;padding:5px" id="${qid}"></div>
      <div style="font-size:7.5px;color:${textColor};opacity:.25;letter-spacing:2px;text-transform:uppercase">isogon.in</div>
    </div>`;
  document.body.appendChild(tpl);
  genQR(document.getElementById(qid),cardUrl(c.id),52);
  await new Promise(r=>setTimeout(r,520));
  const dlTarget=tpl._glassWrap||tpl;
  try{const cv=await html2canvas(dlTarget,{scale:3,useCORS:true,allowTaint:true,backgroundColor:null,logging:false});const a=document.createElement('a');a.download=(c.name.replace(/[\s]+/g,'_')||'card')+'_isogon.png';a.href=cv.toDataURL('image/png');a.click();}catch(e){console.error(e);alert('Download failed.');}
  if(tpl._glassWrap){document.body.removeChild(tpl._glassWrap);}else{document.body.removeChild(tpl);}
}

    </div>
    <div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap">
      <button class="btn btn-navy" onclick="saveCard(${id?`'${id}'`:'null'})">${id?'Save Changes':'Create Card'}</button>
      ${id?`<button class="btn btn-danger" onclick="delCard('${id}')">Delete</button>`:''}
    </div>
    <div class="sok" id="sok">✓ Saved!</div>
    <div class="serr" id="serr"></div>
  </div>
  <div class="eprev">
    <div class="pvlbl">Live Preview</div>
    <div class="mnwrap" id="mnwrap" style="background:linear-gradient(150deg,#0d1b2e,#162438,#1a2f4a)">
      <div id="mniso" style="position:absolute;inset:0;z-index:0;border-radius:14px;overflow:hidden"></div>
      <div>
        <div class="mv-ini" id="pv-ini"></div>
        <div class="mv-tag" id="pv-co"></div>
        <div class="mv-name" id="pv-nm"></div>
        <div class="mv-title" id="pv-tl"></div>
      </div>
      <div>
        <div class="mv-rule" id="pv-rule"></div>
        <div id="pv-ct"></div>
        <div class="mv-foot" id="pv-foot" style="margin-top:7px">isogon.in</div>
      </div>
    </div>
    <div style="font-size:11px;color:var(--g400);margin-top:7px;text-align:center">340 × 420 px</div>
  </div>
</div>`;
  renderBgBody();lp();
}

function renderBgBody(){
  const b=document.getElementById('bg-body');if(!b)return;
  if(eBgTab==='none'){b.innerHTML=`<p style="font-size:12px;color:var(--g400)">Uses theme gradient.</p>`;}
  else if(eBgTab==='isogon'){
    const swatches=ISO_TINTS.map((t,i)=>{
      const isLight=i>=7;
      const swBg=t.color?`linear-gradient(135deg,#080c18,#0d1020)`:'linear-gradient(135deg,#080c18,#0d1020)';
      return`<div class="tint-sw${eIsoTint===i?' active':''}" onclick="setIsoTint(${i})" title="${t.label}" style="background:linear-gradient(135deg,#080c18,#0d1020)">
        ${t.color?`<div style="position:absolute;inset:0;background:${t.color}"></div>`:''}
        <div class="tint-sw-lbl" style="color:${isLight?'rgba(0,0,0,0.7)':'rgba(255,255,255,0.9)'}">${t.label}</div>
      </div>`;
    }).join('');
    b.innerHTML=`
      <div style="width:100%;height:80px;border-radius:10px;border:1px solid var(--g200);margin-bottom:12px;position:relative;overflow:hidden" id="iso-preview-box">
        ${isoSVG(550,80,eIsoTint,eIsoBrightness)}
      </div>
      <div style="font-size:11px;font-weight:600;color:var(--g600);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Tint Color</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">${swatches}</div>
      <div class="size-row">
        <div class="size-lbl">Brightness</div>
        <input type="range" min="0" max="75" value="${eIsoBrightness}" oninput="eIsoBrightness=+this.value;document.getElementById('ibv').textContent=this.value+'%';updateIsoPreview()">
        <div class="size-val" id="ibv">${eIsoBrightness}%</div>
      </div>`;
    updateIsoPreview();
  }
  else if(eBgTab==='color'){
    const presets=BG_COLORS.map(col=>`<div class="color-swatch${eBgColor===col?' active':''}" style="background:${col}" onclick="setColor('${col}')" title="${col}"></div>`).join('');
    b.innerHTML=`<div class="color-row">${presets}</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><input type="color" id="bgcp" value="${eBgColor||'#0d1b2e'}" oninput="setColor(this.value)" style="width:44px;height:36px"><span style="font-size:12px;color:var(--g600)">Custom color</span></div>`;
  }
  else if(eBgTab==='url'){
    b.innerHTML=`${eBgUrl?`<div class="bg-preview-box" style="background-image:url('${eBgUrl}')"></div>`:''}
    <input class="fi" id="bgurl" placeholder="https://example.com/bg.jpg" value="${esc(eBgUrl)}" style="margin-bottom:8px">
    <div class="size-row"><div class="size-lbl">Dark overlay</div><input type="range" min="0" max="90" value="${eSizeOverlay}" oninput="eSizeOverlay=+this.value;document.getElementById('sovv').textContent=this.value+'%';lp()"><div class="size-val" id="sovv">${eSizeOverlay}%</div></div>
    <button class="btn btn-navy" style="width:100%;justify-content:center;font-size:12px;padding:8px" onclick="applyUrl()">Apply</button>`;
  }
  else if(eBgTab==='upload'){
    b.innerHTML=`${eBgUpload?`<div class="bg-preview-box" style="background-image:url('${eBgUpload}')"></div><span style="font-size:10px;color:var(--err);cursor:pointer;display:block;margin-bottom:8px" onclick="clearUpload()">✕ Remove</span>`:''}
    <div class="size-row"><div class="size-lbl">Dark overlay</div><input type="range" min="0" max="90" value="${eSizeOverlay}" oninput="eSizeOverlay=+this.value;document.getElementById('sovv2').textContent=this.value+'%';lp()"><div class="size-val" id="sovv2">${eSizeOverlay}%</div></div>
    <label style="display:block;cursor:pointer;text-align:center;padding:12px;border:1px dashed var(--g200);border-radius:8px;font-size:12px;color:var(--g600)">${eBgUpload?'Change image':'📁 Click to upload'}<br><span style="font-size:10px;opacity:.6">JPG, PNG — under 1MB</span><input type="file" accept="image/*" style="display:none" onchange="handleUpload(this)"></label>`;
  }
}

function updateIsoPreview(){
  const box=document.getElementById('iso-preview-box');
  if(box){
    box.innerHTML=isoSVG(box.offsetWidth||550,box.offsetHeight||80,eIsoTint,eIsoBrightness);
  }
  /* update mini preview too */
  const mn=document.getElementById('mnwrap');
  const mni=document.getElementById('mniso');
  if(mn&&mni&&eBgTab==='isogon'){
    mn.style.background='transparent';
    const mw=mn.offsetWidth||280,mh=mn.offsetHeight||350;
    mni.innerHTML=isoSVG(mw,mh,eIsoTint,eIsoBrightness);
  }
  requestAnimationFrame(lp);
}
function setIsoTint(idx){
  eIsoTint=idx;
  document.querySelectorAll('.tint-sw').forEach((el,i)=>el.classList.toggle('active',i===idx));
  updateIsoPreview();
  requestAnimationFrame(lp);
}
function setColor(col){eBgColor=col;document.querySelectorAll('.color-swatch').forEach(s=>s.classList.toggle('active',s.title===col));const cp=document.getElementById('bgcp');if(cp)cp.value=col;lp();}
function setBgTab(tab){
  eBgTab=tab;
  if(tab==='none'){eBgUpload='';eBgUrl='';eBgColor='';}
  document.querySelectorAll('.bg-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  renderBgBody();
  /* use rAF so mnwrap has been painted and offsetWidth is real */
  requestAnimationFrame(()=>requestAnimationFrame(lp));
}
function applyUrl(){const v=document.getElementById('bgurl')?.value.trim()||'';eBgUrl=v;eBgUpload='';renderBgBody();lp();}
function handleUpload(inp){const file=inp.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{eBgUpload=e.target.result;eBgUrl='';renderBgBody();lp();};r.readAsDataURL(file);}
function clearUpload(){eBgUpload='';renderBgBody();lp();}
function selTheme(tid){eTheme=tid;document.querySelectorAll('.tsw').forEach(s=>s.classList.toggle('active',s.classList.contains('sw-'+tid)));if(!eAccent){const fac=document.getElementById('fac');if(fac)fac.value=TH[tid].a;}requestAnimationFrame(lp);}

function lp(){
  const g=id=>document.getElementById(id)?.value||'';
  const nm=g('fn'),tl=g('ft'),co=g('fc'),ph=g('fp'),em=g('fe'),ws=g('fw');
  const mn=document.getElementById('mnwrap');if(!mn)return;
  const t=TH[eTheme]||TH.midnight;
  const accent=eTheme==='glass'&&!eAccent?'rgba(255,255,255,0.9)':(eAccent||t.a);
  const accent2=eTheme==='glass'?'rgba(255,255,255,0.6)':t.a2;
  /* text color */
  let textCol=eTextColor;
  if(!textCol){
    if(eTheme==='glass'){textCol='#ffffff';}
    else if(eBgTab==='isogon'){textCol=(eIsoBrightness>50||(eIsoTint>=7&&eIsoBrightness>20))?'#111':'#fff';}
    else if(eBgTab==='color'&&eBgColor){textCol=isDark(eBgColor)?'#fff':'#111';}
    else if(eBgTab==='url'||eBgTab==='upload'){textCol='#fff';}
    else{textCol=t.dark?'#fff':'#1a1208';}
  }
  /* bg — always reset first to avoid stale styles */
  mn.style.backgroundImage='';mn.style.backgroundSize='';mn.style.backgroundPosition='';
  mn.style.backdropFilter='';mn.style.webkitBackdropFilter='';mn.style.border='';
  mn.style.boxShadow='';
  mn.classList.remove('theme-glass');
  const mwrap0=mn.parentElement;
  if(mwrap0){mwrap0.style.background='';mwrap0.style.padding='';}
  const mni=document.getElementById('mniso');
  if(eBgTab==='isogon'){
    mn.style.background='transparent';
    if(mni){
      const mw=mn.offsetWidth||280,mh=mn.offsetHeight||350;
      mni.innerHTML=isoSVG(mw,mh,eIsoTint,eIsoBrightness);
    }
  } else {
    if(mni)mni.innerHTML='';
    if(eTheme==='glass'){
      /* Glass: transparent + blurred card over colourful background */
      mn.classList.add('theme-glass');
      mn.style.background='rgba(255,255,255,0.10)';
      mn.style.backdropFilter='blur(18px) saturate(180%)';
      mn.style.webkitBackdropFilter='blur(18px) saturate(180%)';
      mn.style.border='1px solid rgba(255,255,255,0.30)';
      mn.style.boxShadow='0 8px 32px rgba(0,0,0,0.28),inset 0 1px 0 rgba(255,255,255,0.35)';
      /* Colourful blob background in the preview wrapper */
      const mwrap=mn.parentElement;
      if(mwrap){
        mwrap.style.background='linear-gradient(135deg,#1a1a2e 0%,#16213e 35%,#0f3460 65%,#533483 100%)';
        mwrap.style.padding='0';
      }
    } else if(eBgTab==='color'&&eBgColor){
      mn.style.background=eBgColor;
    } else if(eBgTab==='url'&&eBgUrl){
      mn.style.background='#111';
      mn.style.backgroundImage=`url('${eBgUrl}')`;
      mn.style.backgroundSize='cover';mn.style.backgroundPosition='center';
    } else if(eBgTab==='upload'&&eBgUpload){
      mn.style.background='#111';
      mn.style.backgroundImage=`url('${eBgUpload}')`;
      mn.style.backgroundSize='cover';mn.style.backgroundPosition='center';
    } else {
      mn.style.background=`linear-gradient(150deg,${t.bg1} 0%,${t.bg2} 55%,${t.bg3} 100%)`;
    }
  }
  mn.style.setProperty('--ac',accent);mn.style.setProperty('--ac2',accent2);
  const s=(id,h,st={})=>{const el=document.getElementById(id);if(!el)return;el.innerHTML=h;Object.assign(el.style,st);};
  s('pv-ini',ini(nm||'?'),{color:accent,borderColor:accent+'55',background:accent+'18'});
  s('pv-co',co||'Isogon',{color:accent});
  s('pv-nm',nm||'<span style="opacity:.28">Full Name</span>',{fontSize:eSizeTitle*.5+'px',color:textCol});
  s('pv-tl',tl||'<span style="opacity:.28">Job Title</span>',{fontSize:Math.round(eSizeTitle*.5*.52)+'px',color:textCol,opacity:'1'});
  const ct=document.getElementById('pv-ct');if(ct)ct.innerHTML=[ph,em,ws].filter(Boolean).map(x=>`<div class="mv-ct" style="font-size:${eSizeContact*.5}px;color:${textCol}">${x}</div>`).join('');
  const rl=document.getElementById('pv-rule');if(rl)rl.style.background=accent;
  const ft=document.getElementById('pv-foot');if(ft)ft.style.color=textCol;
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function saveCard(id){
  const ok=document.getElementById('sok'),er=document.getElementById('serr');
  ok.style.display='none';er.style.display='none';
  const name=document.getElementById('fn').value.trim();
  if(!name){er.textContent='Name is required.';er.style.display='block';return;}
  const payload={
    name,title:document.getElementById('ft').value.trim(),company:document.getElementById('fc').value.trim()||'Isogon',
    phone:document.getElementById('fp').value.trim(),email:document.getElementById('fe').value.trim(),
    website:document.getElementById('fw').value.trim(),linkedin:document.getElementById('fli').value.trim(),
    photo_url:document.getElementById('fph').value.trim(),active:document.getElementById('fa').checked,
    theme:eTheme,bg_type:eBgTab,
    bg_url:eBgTab==='url'?eBgUrl:'',bg_upload:eBgTab==='upload'?eBgUpload:'',bg_color:eBgTab==='color'?eBgColor:'',
    bg_overlay_opacity:eSizeOverlay,text_color:eTextColor,accent_color:eAccent,
    size_title:eSizeTitle,size_contact:eSizeContact,iso_tint:eIsoTint,iso_brightness:eIsoBrightness,
  };
  let res;
  if(id&&id!=='null'){res=await db.from('cards').update(payload).eq('id',id);}
  else{res=await db.from('cards').insert([payload]).select().single();}
  if(res.error){er.textContent=res.error.message;er.style.display='block';return;}
  window.location.hash='#/dashboard';
}
</script>
</body>
</html>
